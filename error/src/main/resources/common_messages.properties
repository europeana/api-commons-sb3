#  common messages
error.invalid_param=The parameter {0} sent in the request is invalid, expected : {1}, found : {2}
error.missing_param=The mandatory parameter {0} was not found in the request
error.invalid_id=The identifier requested is not valid for a {0}, expected: {1}
error.not_found=No {0} was found with the identifier: {1}
error.invalid_body_missing={0} : is missing but it is required
error.invalid_body_pattern={0} : does not match the regex pattern ^([a-z]{2})$
error.etag_mismatch=The resource being updated has been modified since it was last retrieved, as indicated by a mismatched ETag value in the If-Match header. The latest version should be obtained, the changes reapplied, and the request resubmitted. If necessary, a force override may be performed, but this is not recommended as more recent updates could be overwritten.
error.modified_since=The resource being updated has been modified since it was last retrieved, as indicated by the If-Modified-Since precondition not being met. The latest version should be obtained, the changes reapplied, and the request resubmitted. If necessary, a force override may be performed, but this is not recommended as more recent updates could be overwritten.


